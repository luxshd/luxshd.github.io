<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/homework21/style.css">
    <script src="../js/homework21/main.js"></script>
    <title>Document</title>
</head>
<body>

    <div class="container p-5">

        <div class="p-5 rounded shadow">
            <div class="mb-3">
              <label for="userHeight" class="form-label fw-bold">Ваш рост (м):</label>
              <input pattern='^([1-3]|[0-3]\.[0-9][0-9]{0,1})$' class="form-control" id="userHeight" required value="">
              <small class="text-danger">Введите рост в метрах, например: 1.8 или 1.85</small>
              <small class="text-success">Данные введены верно</small>
            </div>
            <div class="mb-3">
              <label for="userMass" class="form-label fw-bold">Ваш вес (кг):</label>
              <input pattern='^([0-9]{2,3}|[0-9]{2,3}\.[0-9]{1,2})$'  class="form-control" id="userMass" required value="">
              <small class="text-danger">Введите вес в кг, например: 70 или 70.2</small>
              <small class="text-success">Данные введены верно</small>
            </div>
            <button onclick="getBodyIndex()" type="submit" class="btn btn-primary w-100">Рассчитать</button>
            <h3 class="mt-5 mb-3">Ваш индекс: <output id="indexValue">-</output></h3>
            <h4>Он означает: <output id="indexDescription">-</output></h4>
        </div>

    </div>
    

</body>
</html>
